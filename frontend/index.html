<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Shortly — a fast, analytics-rich URL shortener. Create short links, generate QR codes, and track clicks." />
    <title>Shortly — URL Shortener</title>
    <script>
      // Apply the saved/OS theme before first paint to avoid a light-mode flash.
      (function () {
        try {
          var saved = localStorage.getItem("url_shortener_theme");
          var dark = saved
            ? saved === "dark"
            : window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
