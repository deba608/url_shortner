# Render Blueprint — provisions the API, a Postgres database, and a Redis instance.
# Deploy via Render Dashboard → "New +" → "Blueprint".
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Web API ────────────────────────────────────────────────────────
  - type: web
    name: url-shortener-api
    runtime: node
    plan: free

    # `npm ci` is faster than `npm install`:
    #   • Reads package-lock.json exactly (no resolution step)
    #   • Fails fast if lock is out of sync (catches mistakes early)
    #   • Render caches node_modules between deploys when lock is unchanged
    buildCommand: npm ci && npx prisma generate

    # Sync schema directly on startup to avoid migration table lockups.
    startCommand: npx prisma db push --accept-data-loss && node server.js

    healthCheckPath: /health

    # Auto-deploy only on pushes to main — prevents accidental deploys
    autoDeploy: true

    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: url-shortener-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: url-shortener-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # REQUIRED: set this to the service's public URL after the first deploy
      # e.g. https://url-shortener-api.onrender.com
      # The BASE_URL is used to build shortUrl in API responses.
      - key: BASE_URL
        sync: false
      # OPTIONAL: set to your Vercel frontend URL to allow cross-origin requests
      # e.g. https://shortly.vercel.app
      - key: FRONTEND_URL
        value: https://shortly-devv.vercel.app

  # ── Managed Redis ──────────────────────────────────────────────────
  - type: keyvalue
    name: url-shortener-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []   # internal-only

databases:
  - name: url-shortener-db
    plan: free
