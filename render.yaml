# Render Blueprint — provisions the API, a Postgres database, and a Redis (key-value)
# instance in one click. Deploy via Render Dashboard → "New +" → "Blueprint".
# Docs: https://render.com/docs/blueprint-spec

services:
  # --- Web API -------------------------------------------------------------
  - type: web
    name: url-shortener-api
    runtime: node
    plan: free
    # Build the Prisma client; the schema is generated at build time.
    buildCommand: npm install && npx prisma generate
    # Apply pending migrations, then boot. `migrate deploy` is non-interactive
    # and safe to run on every deploy (it only applies un-applied migrations).
    startCommand: npx prisma migrate deploy && node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: url-shortener-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: url-shortener-redis
          property: connectionString
      # Auto-generated 32+ char secret (satisfies production env validation).
      - key: JWT_SECRET
        generateValue: true
      # Set this to the service's public URL after the first deploy
      # (e.g. https://url-shortener-api.onrender.com) so generated short links
      # point at the right host.
      - key: BASE_URL
        sync: false

  # --- Managed Redis (Render calls this a "Key Value" instance) ------------
  - type: keyvalue
    name: url-shortener-redis
    plan: free
    # noeviction: don't silently drop cache keys under memory pressure.
    maxmemoryPolicy: noeviction
    # Only allow internal connections from services in this blueprint.
    ipAllowList: []

databases:
  - name: url-shortener-db
    plan: free
